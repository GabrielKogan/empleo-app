name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Dummy DB URL solo para que `prisma generate` y el build de Next.js
      # no fallen en CI. No se conecta de verdad durante el build.
      DATABASE_URL: "postgresql://user:password@localhost:5432/dummy"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Prisma generate
        run: npx prisma generate

      - name: Build
        run: npm run build
